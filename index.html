<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WAHOU</title>
<style>
  /* ============================================================
     JETONS DE DESIGN — palette "Anti-Cocomelon" / Low-Dopamine
     Uniquement des pastels doux. Aucun néon, aucune couleur vive.
     ============================================================ */
  :root {
    --cream:        #FAF6EC;
    --paper:        #FFFDF8;
    --ink:          #4A4640;
    --ink-soft:     #8A8377;

    --seafoam:      #C3DDD4;   --seafoam-deep: #9CC4B6;
    --sky:          #C9DCE6;   --sky-deep:     #A6C2D1;
    --sand:         #EAE0C8;   --sand-deep:    #D8C79E;
    --mustard:      #E3C170;   --mustard-deep: #CDA84F;
    --lilac:        #D6CBE0;   --lilac-deep:   #BEACD0;

    --brick:        #B5583C;   --brick-deep:   #9C4A31;
    --moss:         #A9C39A;   --moss-deep:    #8FAE7E;
    --clay:         #DDA669;   --clay-deep:    #C88F52;

    --radius-lg: 28px;
    --radius-md: 20px;
    --radius-pill: 999px;
    --ease: cubic-bezier(0.45, 0, 0.2, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: "Quicksand", "Baloo 2", "Trebuchet MS", "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background-color 1.1s var(--ease);
  }
  body.bug-active { background: #EDEAE4; }

  .app {
    width: 100%; height: 100%; max-width: 1400px;
    padding: clamp(14px, 2.4vw, 34px);
    display: grid;
    grid-template-rows: auto 1fr;
    gap: clamp(6px, 1.4vh, 16px);
  }

  /* ============================================================
     BARRE SUPÉRIEURE — fleurs + streak (Parent uniquement)
     ============================================================ */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    min-height: 40px; visibility: hidden;
  }
  .topbar .left, .topbar .right { display: flex; align-items: center; gap: 12px; }

  .home-btn {
    border: none; background: var(--paper); color: var(--ink-soft);
    font-size: 19px; width: 42px; height: 42px; border-radius: 50%;
    cursor: pointer; box-shadow: 0 2px 0 rgba(0,0,0,0.04);
    transition: transform 0.4s var(--ease);
  }
  .home-btn:active { transform: scale(0.94); }

  .pill {
    background: var(--paper); border-radius: var(--radius-pill);
    padding: 8px 16px; font-weight: 700; font-size: clamp(13px, 1.5vw, 17px);
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.04);
    transition: transform 0.5s var(--ease);
  }
  .pill.pulse { transform: scale(1.08); }

  /* ============================================================
     ÉCRANS — un seul visible à la fois, fondu lent
     ============================================================ */
  .screen {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: clamp(8px, 1.6vh, 18px); width: 100%; height: 100%;
    opacity: 0; animation: screenIn 0.8s var(--ease) forwards;
  }
  .screen.active { display: flex; }
  @keyframes screenIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }

  /* ============================================================
     ROBOT — élément central, calme, avec sa phrase fixe
     ============================================================ */
  .robot-face {
    font-size: clamp(56px, 9vw, 110px); line-height: 1;
    filter: drop-shadow(0 6px 10px rgba(154, 141, 110, 0.18));
    animation: breathe 4.5s ease-in-out infinite;
    transition: transform 0.9s var(--ease);
  }
  @keyframes breathe { 0%,100% { transform: translateY(0) scale(1);} 50% { transform: translateY(-6px) scale(1.015);} }

  .robot-caption {
    font-size: clamp(14px, 1.8vw, 20px);
    color: var(--ink-soft); font-weight: 600; margin-top: -4px;
  }

  .robot-stage {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: clamp(2px, 0.8vh, 8px); text-align: center;
  }
  .robot-message {
    font-size: clamp(18px, 2.6vw, 32px); font-weight: 700; min-height: 1.3em;
    transition: opacity 0.7s var(--ease), transform 0.7s var(--ease);
  }
  .robot-message.fade { opacity: 0; transform: translateY(6px); }
  .robot-submessage {
    color: var(--ink-soft); font-size: clamp(12.5px, 1.4vw, 17px); font-weight: 500;
    min-height: 1.3em; transition: opacity 0.7s var(--ease);
  }

  /* ============================================================
     ACCUEIL — sélecteur de rôle
     ============================================================ */
  .app-title { font-size: clamp(24px, 3.4vw, 38px); font-weight: 700; margin: 4px 0 0; }

  .role-select {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: clamp(16px, 3vw, 32px); width: 100%; max-width: 760px; margin-top: 6px;
  }
  .role-card {
    font-family: inherit; border: none; cursor: pointer; border-radius: var(--radius-lg);
    padding: clamp(24px, 4vh, 42px) 18px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.06);
    transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease), background-color 0.5s var(--ease);
  }
  .role-card:active { transform: translateY(3px) scale(0.99); box-shadow: 0 1px 0 rgba(0,0,0,0.06); }
  .role-card.teacher { background: var(--sky); } .role-card.teacher:active { background: var(--sky-deep); }
  .role-card.parent  { background: var(--sand); } .role-card.parent:active  { background: var(--sand-deep); }
  .role-icon  { font-size: clamp(38px, 5vw, 58px); }
  .role-title { font-weight: 700; font-size: clamp(15px, 1.9vw, 21px); letter-spacing: 0.03em; }
  .role-sub   { color: var(--ink-soft); font-size: clamp(12px, 1.3vw, 15px); text-align: center; }

  /* ============================================================
     TEACHER MODE
     ============================================================ */
  #screenTeacher { justify-content: flex-start; }

  .toolbar {
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px;
  }
  .tab {
    border: none; background: var(--paper); color: var(--ink-soft);
    font-family: inherit; font-weight: 600; font-size: clamp(12.5px, 1.3vw, 15px);
    padding: 10px 18px; border-radius: var(--radius-pill); cursor: pointer;
    box-shadow: 0 2px 0 rgba(0,0,0,0.04);
    transition: background-color 0.6s var(--ease), color 0.6s var(--ease), transform 0.6s var(--ease);
  }
  .tab.active { background: var(--lilac); color: var(--ink); transform: translateY(-2px); }

  .bug-btn {
    border: none; background: var(--brick); color: #FCF3EF;
    font-family: inherit; font-weight: 700; font-size: clamp(12.5px, 1.3vw, 15px);
    padding: 10px 18px; border-radius: var(--radius-pill); cursor: pointer;
    box-shadow: 0 2px 0 rgba(0,0,0,0.06);
    transition: background-color 0.5s var(--ease), transform 0.4s var(--ease);
  }
  .bug-btn:active { background: var(--brick-deep); transform: translateY(2px); }

  .module { display: none; flex-direction: column; gap: 14px; width: 100%; align-items: center; }
  .module.active { display: flex; }

  .row { display: grid; gap: clamp(10px, 1.6vw, 20px); width: 100%; max-width: 900px; }
  .row.validation { grid-template-columns: repeat(2, 1fr); }
  .row.single     { grid-template-columns: 1fr; max-width: 440px; margin: 0 auto; }

  button.action {
    font-family: inherit; border: none; cursor: pointer; border-radius: var(--radius-lg);
    padding: clamp(15px, 2.4vh, 24px) 10px; font-size: clamp(14.5px, 1.6vw, 20px);
    font-weight: 700; color: var(--ink); box-shadow: 0 4px 0 rgba(0,0,0,0.06);
    transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease), background-color 0.5s var(--ease), filter 0.5s var(--ease);
  }
  button.action:active { transform: translateY(3px) scale(0.99); box-shadow: 0 1px 0 rgba(0,0,0,0.06); }
  .btn-generate { background: var(--mustard); } .btn-generate:active { background: var(--mustard-deep); }
  .btn-match    { background: var(--moss); }    .btn-match:active    { background: var(--moss-deep); }
  .btn-missed   { background: var(--clay); }    .btn-missed:active   { background: var(--clay-deep); }
  .btn-sound    { background: var(--lilac); }   .btn-sound:active    { background: var(--lilac-deep); }
  .btn-icon { display: block; font-size: 1.4em; margin-bottom: 4px; }

  .sequence-row { display: flex; gap: 12px; justify-content: center; }
  .sequence-step {
    background: var(--paper); border-radius: var(--radius-md); padding: 10px 16px;
    font-size: clamp(20px, 2.8vw, 32px); box-shadow: 0 2px 0 rgba(0,0,0,0.04);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .sequence-step .step-label { font-size: clamp(10px, 1vw, 12px); color: var(--ink-soft); font-weight: 600; }

  .shape-icon { width: clamp(50px, 6vw, 78px); height: clamp(50px, 6vw, 78px); }

  /* ============================================================
     PARENT MODE — session autonome
     ============================================================ */
  #screenParent { justify-content: flex-start; }

  .session-tag {
    color: var(--ink-soft); font-size: clamp(11.5px, 1.2vw, 14px); font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase; opacity: 0.8;
  }

  .round-stage { width: 100%; max-width: 760px; margin: 0 auto; }

  .round { display: none; flex-direction: column; align-items: center; gap: 18px; }
  .round.active { display: flex; }

  /* ---- Jeux de correspondance (Animal / Audio Animal / Color) ---- */
  .prompt-box {
    background: var(--paper); border-radius: var(--radius-lg);
    width: clamp(120px, 16vw, 170px); height: clamp(120px, 16vw, 170px);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(48px, 7vw, 88px);
    box-shadow: 0 3px 0 rgba(0,0,0,0.05);
    transition: transform 0.6s var(--ease);
  }
  .prompt-box.color-swatch { border-radius: var(--radius-lg); }

  .options-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 100%; max-width: 620px; }
  .option-btn {
    border: none; cursor: pointer; border-radius: var(--radius-lg);
    background: var(--paper); aspect-ratio: 1/1;
    font-size: clamp(38px, 5.5vw, 64px);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 0 rgba(0,0,0,0.05);
    transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease), background-color 0.5s var(--ease), opacity 0.5s var(--ease);
  }
  .option-btn:active { transform: translateY(2px) scale(0.98); }
  .option-btn.correct-flash { background: var(--moss); }
  .option-btn.wrong-flash   { opacity: 0.45; }

  /* ---- Shape Sorter (drag & drop) ---- */
  .sorter-stage {
    position: relative; width: 100%; max-width: 640px; height: clamp(260px, 34vh, 340px);
    margin: 0 auto;
    transition: transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .sorter-stage.spin-complete { transform: rotate(360deg) scale(1.04); }

  .sorter-slot {
    position: absolute; top: 16%;
    width: clamp(56px, 8vw, 78px); height: clamp(56px, 8vw, 78px);
    transform: translate(-50%, -50%);
    opacity: 0.75;
  }
  .sorter-slot.filled { opacity: 1; }
  .sorter-slot svg { width: 100%; height: 100%; }

  .sorter-piece {
    position: absolute; top: 78%;
    width: clamp(52px, 7.4vw, 72px); height: clamp(52px, 7.4vw, 72px);
    transform: translate(-50%, -50%);
    cursor: grab; touch-action: none;
    filter: drop-shadow(0 3px 3px rgba(0,0,0,0.08));
    transition: left 0.5s var(--ease), top 0.5s var(--ease);
  }
  .sorter-piece.dragging { transition: none; cursor: grabbing; z-index: 5; }
  .sorter-piece.placed { cursor: default; }
  .sorter-piece svg { width: 100%; height: 100%; }

  .sparkle {
    position: absolute; font-size: 22px; opacity: 0; pointer-events: none;
    animation: twinkle 1.6s ease-in-out forwards;
  }
  @keyframes twinkle {
    0%   { opacity: 0; transform: scale(0.4) translateY(0); }
    30%  { opacity: 1; transform: scale(1) translateY(-6px); }
    100% { opacity: 0; transform: scale(0.7) translateY(-26px); }
  }

  .progress-dots { display: flex; gap: 9px; justify-content: center; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--sand-deep);
    transition: background-color 0.6s var(--ease), transform 0.6s var(--ease); }
  .dot.done { background: var(--moss-deep); transform: scale(1.15); }
  .dot.current { background: var(--mustard-deep); }

  /* ============================================================
     RÉCAPITULATIF
     ============================================================ */
  #screenRecap h2 { font-size: clamp(22px, 3vw, 32px); margin: 6px 0 0; }
  .flower-row { font-size: clamp(24px, 4vw, 40px); letter-spacing: 4px; }
  .recap-summary { color: var(--ink-soft); font-size: clamp(14px, 1.6vw, 18px); text-align: center; max-width: 420px; }

  footer.note {
    text-align: center; color: var(--ink-soft); font-size: clamp(11px, 1.1vw, 13px);
    opacity: 0.7; margin-top: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .robot-face { animation: none; }
    .screen { animation: none; opacity: 1; }
    .sorter-stage.spin-complete { transform: none; }
    * { transition-duration: 0.2s !important; }
  }
</style>
</head>
<body>

  <div class="app">

    <!-- ============================================================
         BARRE SUPÉRIEURE
         ============================================================ -->
    <div class="topbar" id="topbar">
      <div class="left">
        <button class="home-btn" onclick="goHome()" title="Accueil">🏠</button>
        <div class="pill" id="flowerPill"><span>🌸</span><span id="flowerCount">0</span></div>
      </div>
      <div class="right">
        <div class="pill" id="streakPill" style="display:none;"><span>🔥</span><span id="streakDays">0</span>&nbsp;jours</div>
      </div>
    </div>

    <!-- ============================================================
         ÉCRAN : ACCUEIL
         ============================================================ -->
    <div class="screen active" id="screenHome">
      <div class="robot-face">🤖</div>
      <div class="robot-caption">Joue avec moi</div>
      <h1 class="app-title">WAHOU</h1>
      <div class="role-select">
        <button class="role-card teacher" onclick="selectRole('teacher')">
          <span class="role-icon">🧑‍🏫</span>
          <span class="role-title">TEACHER MODE</span>
          <span class="role-sub">Tableau de bord complet</span>
        </button>
        <button class="role-card parent" onclick="selectRole('parent')">
          <span class="role-icon">👨‍👩‍👧</span>
          <span class="role-title">PARENT MODE</span>
          <span class="role-sub">Parcours autonome pour l'enfant</span>
        </button>
      </div>
    </div>

    <!-- ============================================================
         ÉCRAN : TEACHER MODE
         ============================================================ -->
    <div class="screen" id="screenTeacher">

      <div class="robot-stage">
        <div class="robot-face" id="robotFace">🤖</div>
        <div class="robot-message" id="robotMessage">Prêt à jouer !</div>
        <div class="robot-submessage" id="robotSubmessage">Choisis un module ci-dessous.</div>
        <svg class="shape-icon" id="shapeIcon" viewBox="0 0 100 100" style="display:none;"></svg>
        <div class="sequence-row" id="sequenceRow" style="display:none;"></div>
      </div>

      <nav class="toolbar">
        <button class="tab active" data-mod="follower" onclick="switchModule('follower')">Robot Follower</button>
        <button class="tab" data-mod="architect" onclick="switchModule('architect')">Shape Architect</button>
        <button class="tab" data-mod="language" onclick="switchModule('language')">Language Mimic</button>
        <button class="bug-btn" onclick="triggerBug()">⚠️ Execute Bug</button>
      </nav>

      <!-- Robot Follower -->
      <div class="module active" id="mod-follower">
        <div class="row single">
          <button class="action btn-generate" onclick="generateSequence()"><span class="btn-icon">🎲</span>Nouvelle séquence</button>
        </div>
        <div class="row validation">
          <button class="action btn-match" onclick="validateSequence(true)"><span class="btn-icon">✅</span>Réussi !</button>
          <button class="action btn-missed" onclick="validateSequence(false)"><span class="btn-icon">🔁</span>On réessaie</button>
        </div>
      </div>

      <!-- Shape Architect -->
      <div class="module" id="mod-architect">
        <div class="row single">
          <button class="action btn-generate" onclick="generateArchitect()"><span class="btn-icon">📐</span>Nouvelle forme</button>
        </div>
        <div class="row validation">
          <button class="action btn-match" onclick="validateArchitect(true)"><span class="btn-icon">✅</span>Construit !</button>
          <button class="action btn-missed" onclick="validateArchitect(false)"><span class="btn-icon">🔁</span>Un coup de main</button>
        </div>
      </div>

      <!-- Language Mimic -->
      <div class="module" id="mod-language">
        <div class="row single">
          <button class="action btn-sound" onclick="playLanguageWord()"><span class="btn-icon">🔊</span>Jouer le son</button>
        </div>
        <div class="row validation">
          <button class="action btn-match" onclick="validateLanguage(true)"><span class="btn-icon">✅</span>Réussi !</button>
          <button class="action btn-missed" onclick="validateLanguage(false)"><span class="btn-icon">🔁</span>On réessaie</button>
        </div>
      </div>

    </div>

    <!-- ============================================================
         ÉCRAN : PARENT MODE — session autonome (l'enfant touche l'écran)
         ============================================================ -->
    <div class="screen" id="screenParent">
      <div class="robot-stage">
        <div class="robot-face" id="robotFaceParent">🤖</div>
        <div class="robot-message" id="robotMessageParent">C'est parti !</div>
        <div class="session-tag">Session autonome</div>
      </div>

      <div class="round-stage">

        <!-- Ronde : Shape Sorter -->
        <div class="round" id="round-sorter">
          <div class="sorter-stage" id="sorterStage"></div>
        </div>

        <!-- Ronde : jeux de correspondance (structure partagée) -->
        <div class="round" id="round-match">
          <div class="prompt-box" id="matchPrompt"></div>
          <div class="options-row" id="matchOptions"></div>
        </div>

      </div>

      <div class="progress-dots" id="progressDots"></div>
    </div>

    <!-- ============================================================
         ÉCRAN : RÉCAPITULATIF (fin de session Parent)
         ============================================================ -->
    <div class="screen" id="screenRecap">
      <div class="robot-face">🤖</div>
      <h2>Bravo, quelle belle session !</h2>
      <div class="flower-row" id="recapFlowerRow"></div>
      <p class="recap-summary" id="recapSummary"></p>
      <button class="action btn-generate" onclick="goHome()" style="max-width:280px;">Retour à l'accueil</button>
    </div>

    <footer class="note">WAHOU — un écran calme pour accompagner le jeu moteur des tout-petits</footer>
  </div>

<script>
  /* ============================================================
     ÉTAT GLOBAL — variables simples, aucune donnée externe
     ============================================================ */
  const state = {
    role: null,
    flowers: 0,
    streakDays: 3,
    parent: { queue: [], index: 0 }
  };

  const $ = (id) => document.getElementById(id);
  const body = document.body;

  /* ============================================================
     BARRE SUPÉRIEURE
     ============================================================ */
  function addFlower() {
    state.flowers += 1;
    $('flowerCount').textContent = state.flowers;
    const pill = $('flowerPill');
    pill.classList.add('pulse');
    setTimeout(() => pill.classList.remove('pulse'), 500);
  }

  function refreshTopbar() {
    $('flowerCount').textContent = state.flowers;
    $('streakDays').textContent = state.streakDays;
    $('streakPill').style.display = state.role === 'parent' ? 'flex' : 'none';
  }

  /* ============================================================
     NAVIGATION ENTRE ÉCRANS
     ============================================================ */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
  }

  function goHome() {
    state.role = null;
    $('topbar').style.visibility = 'hidden';
    body.classList.remove('bug-active');
    showScreen('screenHome');
  }

  function selectRole(role) {
    state.role = role;
    $('topbar').style.visibility = 'visible';
    refreshTopbar();

    if (role === 'teacher') {
      switchModule('follower');
      showScreen('screenTeacher');
    } else {
      startParentSession();
      showScreen('screenParent');
    }
  }

  /* ============================================================
     TEACHER MODE — aides partagées du robot
     ============================================================ */
  function setRobotText(mainText, subText) {
    const msg = $('robotMessage'), sub = $('robotSubmessage');
    msg.classList.add('fade'); sub.style.opacity = 0;
    setTimeout(() => {
      msg.textContent = mainText;
      sub.textContent = subText;
      msg.classList.remove('fade');
      sub.style.opacity = 1;
    }, 350);
  }
  function setFace(emoji) {
    const face = $('robotFace');
    face.style.transform = 'scale(0.85)';
    setTimeout(() => { face.textContent = emoji; face.style.transform = 'scale(1)'; }, 250);
  }
  function hideExtras() {
    $('shapeIcon').style.display = 'none';
    $('sequenceRow').style.display = 'none';
  }

  const moduleDefaults = {
    follower:  ['Prêt à suivre !',   'Touche "Nouvelle séquence" pour commencer.'],
    architect: ['Prêt à construire !', 'Touche "Nouvelle forme" pour commencer.'],
    language:  ['Prêt à écouter !',  'Touche "Jouer le son" pour commencer.']
  };

  function switchModule(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mod === name));
    document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
    $('mod-' + name).classList.add('active');

    body.classList.remove('bug-active');
    hideExtras();
    setFace('🤖');
    const [main, sub] = moduleDefaults[name];
    setRobotText(main, sub);

    sequenceGenerated = false;
    architectGenerated = false;
    languageGenerated = false;
  }

  function triggerBug() {
    body.classList.add('bug-active');
    setFace('😵‍💫');
    setRobotText('Oups ! On réessaie !', 'Une petite pause, puis on recommence en douceur.');
  }

  /* ============================================================
     FORMES PARTAGÉES (Shape Architect + Shape Sorter)
     ============================================================ */
  const SHAPE_COLORS = [
    { name: 'BLEUE',  hex: '#A6C2D1' },
    { name: 'ROUGE',  hex: '#C98A75' },
    { name: 'JAUNE',  hex: '#E3C170' },
    { name: 'VERTE',  hex: '#A9C39A' }
  ];
  const SHAPE_TYPES = ['circle', 'square', 'triangle', 'star'];
  const SHAPE_LABELS = { circle: 'ROND', square: 'CARRÉ', triangle: 'TRIANGLE', star: 'ÉTOILE' };

  function shapeMarkup(type, attrs) {
    const points = {
      triangle: '50,10 90,85 10,85',
      star: '50,5 61,35 95,35 68,57 78,90 50,70 22,90 32,57 5,35 39,35'
    };
    switch (type) {
      case 'circle':   return `<circle cx="50" cy="50" r="38" ${attrs} />`;
      case 'square':   return `<rect x="13" y="13" width="74" height="74" rx="10" ${attrs} />`;
      case 'triangle': return `<polygon points="${points.triangle}" ${attrs} />`;
      case 'star':     return `<polygon points="${points.star}" ${attrs} />`;
      default: return '';
    }
  }

  function drawShape(type, hex) {
    const icon = $('shapeIcon');
    icon.style.display = 'block';
    icon.style.opacity = 0;
    icon.innerHTML = shapeMarkup(type, `fill="${hex}"`);
    requestAnimationFrame(() => { icon.style.opacity = 1; });
  }

  /* ============================================================
     MODULE — ROBOT FOLLOWER
     ============================================================ */
  const FOLLOWER_MOVES = [
    { label: 'Jump', emoji: '🦘' },
    { label: 'Turn', emoji: '🔄' },
    { label: 'Toes', emoji: '🙆' }
  ];
  let sequenceGenerated = false;

  function generateSequence() {
    body.classList.remove('bug-active');
    const seq = Array.from({ length: 3 }, () => FOLLOWER_MOVES[Math.floor(Math.random() * FOLLOWER_MOVES.length)]);
    setFace('🤖');
    setRobotText('Suis la séquence', 'Regarde, puis reproduis les 3 mouvements.');
    const row = $('sequenceRow');
    row.innerHTML = seq.map(m => `
      <div class="sequence-step"><span>${m.emoji}</span><span class="step-label">${m.label}</span></div>`).join('');
    row.style.display = 'flex';
    sequenceGenerated = true;
  }
  function validateSequence(success) {
    if (!sequenceGenerated) { setRobotText('Génère une séquence !', 'Touche "Nouvelle séquence" ci-dessus.'); return; }
    if (success) { setFace('😊'); setRobotText('Séquence parfaite !', 'Bravo pour la mémoire et les mouvements !'); addFlower(); }
    else { setFace('🙂'); setRobotText('Presque !', 'On regarde encore une fois ensemble.'); }
  }

  /* ============================================================
     MODULE — SHAPE ARCHITECT
     ============================================================ */
  let architectGenerated = false;
  function generateArchitect() {
    body.classList.remove('bug-active');
    const color = SHAPE_COLORS[Math.floor(Math.random() * SHAPE_COLORS.length)];
    const type = SHAPE_TYPES[Math.floor(Math.random() * 3)]; // pas d'étoile ici, formes simples
    setFace('🧱');
    setRobotText(`Construis un ${SHAPE_LABELS[type]} ${color.name}`, 'Avec des blocs, coussins ou jouets !');
    drawShape(type, color.hex);
    architectGenerated = true;
  }
  function validateArchitect(success) {
    if (!architectGenerated) { setRobotText('Génère une forme !', 'Touche "Nouvelle forme" ci-dessus.'); return; }
    if (success) { setFace('😊'); setRobotText('Belle construction !', 'Cette forme est très réussie !'); addFlower(); }
    else { setFace('🙂'); setRobotText('On continue !', 'Tu y es presque, on ajuste un peu.'); }
  }

  /* ============================================================
     MODULE — LANGUAGE MIMIC
     ============================================================ */
  const LANGUAGE_WORDS = [
    { word: 'Jump',    emoji: '🦘' },
    { word: 'Turn',    emoji: '🔄' },
    { word: 'Clap',    emoji: '👏' },
    { word: 'Stretch', emoji: '🙆' },
    { word: 'Freeze',  emoji: '🧊' }
  ];
  let languageGenerated = false;
  function playLanguageWord() {
    body.classList.remove('bug-active');
    const w = LANGUAGE_WORDS[Math.floor(Math.random() * LANGUAGE_WORDS.length)];
    setFace('🔊');
    setRobotText(w.word, 'Écoute, puis mime l\'action !');
    speakEnglish(w.word);
    languageGenerated = true;
  }
  function validateLanguage(success) {
    if (!languageGenerated) { setRobotText('Joue un son !', 'Touche "Jouer le son" ci-dessus.'); return; }
    if (success) { setFace('😊'); setRobotText('Bien joué !', 'Belle écoute et beau mouvement !'); addFlower(); }
    else { setFace('🙂'); setRobotText('On réessaie !', 'Je le rejoue une fois de plus.'); }
  }

  /* ============================================================
     SYNTHÈSE VOCALE — mots anglais (Language Mimic + Audio Animal)
     ============================================================ */
  function speakEnglish(text) {
    if (!('speechSynthesis' in window)) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 0.85;
    window.speechSynthesis.speak(utter);
  }

  /* ============================================================
     CARILLON DOUX — Web Audio, sans fichier externe
     ============================================================ */
  function playChime() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      const ctx = new Ctx();
      const notes = [523.25, 659.25, 783.99]; // arpège doux Do-Mi-Sol
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t0 = ctx.currentTime + i * 0.15;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(0.14, t0 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.6);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + 0.6);
      });
    } catch (e) { /* audio indisponible : on continue sans son */ }
  }

  /* ============================================================
     PARENT MODE — session autonome (l'enfant touche l'écran)
     ============================================================ */
  // Séquence de 8 rondes représentant ~10 minutes de jeu autonome.
  const PARENT_QUEUE = ['sorter', 'animal', 'color', 'audioAnimal', 'animal', 'sorter', 'color', 'audioAnimal'];

  const ANIMALS = [
    { name: 'Cat',    emoji: '🐱' }, { name: 'Dog',  emoji: '🐶' },
    { name: 'Rabbit', emoji: '🐰' }, { name: 'Bear', emoji: '🐻' },
    { name: 'Duck',   emoji: '🦆' }, { name: 'Fish', emoji: '🐟' }
  ];
  const COLORS = [
    { name: 'Bleu',  hex: '#A6C2D1' }, { name: 'Vert',  hex: '#A9C39A' },
    { name: 'Jaune', hex: '#E3C170' }, { name: 'Beige', hex: '#EAE0C8' },
    { name: 'Lilas', hex: '#D6CBE0' }
  ];

  function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
  function pickOptions(pool, correct, count) {
    const distractors = shuffle(pool.filter(x => x !== correct)).slice(0, count - 1);
    return shuffle([correct, ...distractors]);
  }

  function startParentSession() {
    state.parent.queue = PARENT_QUEUE;
    state.parent.index = 0;
    renderProgressDots();
    renderParentRound();
  }

  function renderProgressDots() {
    const dots = $('progressDots');
    dots.innerHTML = state.parent.queue.map((_, i) => {
      let cls = 'dot';
      if (i < state.parent.index) cls += ' done';
      else if (i === state.parent.index) cls += ' current';
      return `<span class="${cls}"></span>`;
    }).join('');
  }

  function nextParentRound() {
    state.parent.index += 1;
    renderProgressDots();
    if (state.parent.index >= state.parent.queue.length) {
      setTimeout(showRecap, 400);
    } else {
      renderParentRound();
    }
  }

  function setParentFace(emoji) { $('robotFaceParent').textContent = emoji; }
  function setParentMessage(text) { $('robotMessageParent').textContent = text; }

  function renderParentRound() {
    const type = state.parent.queue[state.parent.index];
    document.querySelectorAll('.round').forEach(r => r.classList.remove('active'));
    setParentFace('🤖');

    if (type === 'sorter') {
      setParentMessage('Range les formes dans la boîte !');
      $('round-sorter').classList.add('active');
      initSorter();
    } else {
      $('round-match').classList.add('active');
      if (type === 'animal') renderMatchRound('animal');
      else if (type === 'color') renderMatchRound('color');
      else if (type === 'audioAnimal') renderMatchRound('audioAnimal');
    }
  }

  /* ---- Jeux de correspondance : Animal Match / Color Match / Audio Animal ---- */
  function renderMatchRound(kind) {
    const promptEl = $('matchPrompt');
    const optionsEl = $('matchOptions');
    promptEl.className = 'prompt-box';
    optionsEl.innerHTML = '';

    if (kind === 'animal') {
      const correct = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
      const options = pickOptions(ANIMALS.map(a => a.name), correct.name, 3);
      setParentMessage('Trouve le même animal !');
      promptEl.textContent = correct.emoji;
      buildOptions(options.map(name => ANIMALS.find(a => a.name === name)), correct.name, a => a.emoji, a => a.name);
    }

    if (kind === 'color') {
      const correct = COLORS[Math.floor(Math.random() * COLORS.length)];
      const options = pickOptions(COLORS.map(c => c.name), correct.name, 3);
      setParentMessage('Trouve la même couleur !');
      promptEl.classList.add('color-swatch');
      promptEl.style.background = correct.hex;
      buildOptions(options.map(name => COLORS.find(c => c.name === name)), correct.name, null, c => c.name, c => c.hex);
    }

    if (kind === 'audioAnimal') {
      const correct = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
      const options = pickOptions(ANIMALS.map(a => a.name), correct.name, 3);
      setParentMessage('Écoute, puis montre l\'animal !');
      promptEl.textContent = '🔊';
      speakEnglish(correct.name);
      buildOptions(options.map(name => ANIMALS.find(a => a.name === name)), correct.name, a => a.emoji, a => a.name);
    }
  }

  function buildOptions(items, correctName, emojiFn, nameFn, hexFn) {
    const optionsEl = $('matchOptions');
    items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      if (hexFn) { btn.style.background = hexFn(item); }
      else { btn.textContent = emojiFn(item); }
      btn.addEventListener('click', () => handleMatchAnswer(btn, nameFn(item) === correctName));
      optionsEl.appendChild(btn);
    });
  }

  function handleMatchAnswer(btn, isCorrect) {
    if (isCorrect) {
      btn.classList.add('correct-flash');
      setParentFace('😊');
      addFlower();
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      setTimeout(nextParentRound, 1000);
    } else {
      btn.classList.add('wrong-flash');
      setParentFace('🙂');
      setTimeout(() => btn.classList.remove('wrong-flash'), 500);
    }
  }

  /* ---- Shape Sorter (glisser-déposer) ---- */
  let sorterFilledCount = 0;
  const SORTER_POSITIONS = [16, 38, 62, 84]; // % horizontal pour les 4 emplacements

  function initSorter() {
    const stage = $('sorterStage');
    stage.className = 'sorter-stage';
    stage.innerHTML = '';
    sorterFilledCount = 0;

    // Emplacements (contours en pointillés, couleur assortie)
    SHAPE_TYPES.forEach((shape, i) => {
      const slot = document.createElement('div');
      slot.className = 'sorter-slot';
      slot.dataset.shape = shape;
      slot.style.left = SORTER_POSITIONS[i] + '%';
      slot.innerHTML = `<svg viewBox="0 0 100 100">${shapeMarkup(shape, `fill="none" stroke="${slotColor(shape)}" stroke-width="5" stroke-dasharray="7 6"`)}</svg>`;
      stage.appendChild(slot);
    });

    // Pièces mélangées dans le bac du bas
    const shuffledShapes = shuffle(SHAPE_TYPES);
    shuffledShapes.forEach((shape, i) => {
      const piece = document.createElement('div');
      piece.className = 'sorter-piece';
      piece.dataset.shape = shape;
      piece.dataset.homeLeft = SORTER_POSITIONS[i];
      piece.style.left = SORTER_POSITIONS[i] + '%';
      piece.style.top = '78%';
      piece.innerHTML = `<svg viewBox="0 0 100 100">${shapeMarkup(shape, `fill="${pieceColor(shape)}"`)}</svg>`;
      attachDrag(piece, stage);
      stage.appendChild(piece);
    });
  }

  function slotColor(shape) {
    return { circle: '#9CC4B6', square: '#A6C2D1', triangle: '#D8C79E', star: '#CDA84F' }[shape];
  }
  function pieceColor(shape) {
    return { circle: '#C3DDD4', square: '#C9DCE6', triangle: '#EAE0C8', star: '#E3C170' }[shape];
  }

  function attachDrag(piece, stage) {
    let dragging = false;

    piece.addEventListener('pointerdown', (e) => {
      dragging = true;
      piece.classList.add('dragging');
      piece.setPointerCapture(e.pointerId);
    });

    piece.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const rect = stage.getBoundingClientRect();
      const xPct = ((e.clientX - rect.left) / rect.width) * 100;
      const yPct = ((e.clientY - rect.top) / rect.height) * 100;
      piece.style.left = Math.min(97, Math.max(3, xPct)) + '%';
      piece.style.top = Math.min(97, Math.max(3, yPct)) + '%';
    });

    piece.addEventListener('pointerup', (e) => {
      if (!dragging) return;
      dragging = false;
      piece.classList.remove('dragging');
      dropPiece(piece, stage);
    });
  }

  function dropPiece(piece, stage) {
    const shape = piece.dataset.shape;
    const pieceRect = piece.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const pieceX = ((pieceRect.left + pieceRect.width / 2) - stageRect.left) / stageRect.width * 100;
    const pieceY = ((pieceRect.top + pieceRect.height / 2) - stageRect.top) / stageRect.height * 100;

    const slot = stage.querySelector(`.sorter-slot[data-shape="${shape}"]`);
    const slotX = parseFloat(slot.style.left);
    const slotY = 16; // même valeur que top des emplacements

    const closeEnough = Math.abs(pieceX - slotX) < 14 && Math.abs(pieceY - slotY) < 22;

    if (closeEnough && !slot.classList.contains('filled')) {
      piece.style.left = slotX + '%';
      piece.style.top = slotY + '%';
      piece.classList.add('placed');
      piece.style.pointerEvents = 'none';
      slot.classList.add('filled');
      sorterFilledCount += 1;
      if (sorterFilledCount >= SHAPE_TYPES.length) {
        setTimeout(completeSorter, 500);
      }
    } else {
      // Retour en douceur au bac
      piece.style.left = piece.dataset.homeLeft + '%';
      piece.style.top = '78%';
    }
  }

  function completeSorter() {
    const stage = $('sorterStage');
    stage.classList.add('spin-complete');
    playChime();
    setParentFace('😊');
    setParentMessage('Bravo, la boîte est complète !');
    addFlower();

    // Pluie d'étincelles douces
    for (let i = 0; i < 10; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.textContent = '✨';
      sparkle.style.left = (10 + Math.random() * 80) + '%';
      sparkle.style.top = (20 + Math.random() * 50) + '%';
      sparkle.style.animationDelay = (Math.random() * 0.6) + 's';
      stage.appendChild(sparkle);
    }

    setTimeout(nextParentRound, 2200);
  }

  /* ============================================================
     RÉCAPITULATIF DE FIN DE SESSION
     ============================================================ */
  function showRecap() {
    state.streakDays += 1;
    refreshTopbar();
    const earned = Math.min(state.flowers, state.parent.queue.length);
    $('recapFlowerRow').textContent = '🌸'.repeat(Math.max(earned, 1));
    $('recapSummary').textContent =
      `Ton enfant a joué en autonomie et récolté de jolies fleurs aujourd'hui. `
      + `Vous êtes sur une série de ${state.streakDays} jours !`;
    showScreen('screenRecap');
  }

  /* ============================================================
     INITIALISATION
     ============================================================ */
  refreshTopbar();
</script>

</body>
